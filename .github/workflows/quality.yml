name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-quality:
    name: linux-quality
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      COVERAGE_CORE: sysmon
    steps:
      - name: Check out exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.15
          uv sync --frozen --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright basic
        run: uv run pyright app
      - name: Deterministic protocol and safety evaluation
        run: |
          uv run ceo-quality eval --suite protocol --format junit > quality-protocol.xml
          uv run ceo-quality eval --suite safety --format junit > quality-safety.xml
      - name: Non-live test suite and coverage
        run: >-
          uv run pytest -m "not live and not macos"
          --cov=app --cov-report=term --cov-report=xml:coverage.xml
          --cov-fail-under=84 --junitxml=pytest.xml
      - name: Changed-line coverage
        if: github.event_name == 'pull_request'
        run: uv run diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=90
      - name: Critical-module coverage
        run: uv run python scripts/check_critical_coverage.py coverage.xml --threshold 95
      - name: Dependency audit
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file /tmp/runtime-requirements.txt
          uv run pip-audit --requirement /tmp/runtime-requirements.txt
      - name: Secret scan
        run: uv run python scripts/quality_secret_scan.py

  macos-quality:
    name: macos-quality
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out exact commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install reader build environment
        run: |
          python -m pip install --disable-pip-version-check uv==0.8.15
          uv sync --frozen --extra dev --extra reader-build
      - name: macOS, launchd, plist, and IPC tests
        run: >-
          uv run pytest
          tests/test_hourly_dry_run_launchd.py
          tests/wechat/test_accessibility.py
          tests/wechat/test_reader_app_packaging.py
          tests/wechat/test_reader_ipc.py
          tests/wechat/test_sender_ipc.py
          -m "macos or not live"
      - name: Build Reader and Sender app canaries
        env:
          CEO_WECHAT_READER_BUILD_PYTHON: ${{ github.workspace }}/.venv/bin/python
          CEO_WECHAT_SENDER_BUILD_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: |
          scripts/build-wechat-reader-app.sh --adhoc --output-dir /tmp/ceo-reader-build
          scripts/build-wechat-sender-app.sh --adhoc --output-dir /tmp/ceo-sender-build
